# ════════════════════════════════════════════════════════════════
#  World Cup 2026 Hub — Daily OneDrive → GitHub Pages sync
#  Place this file in your repo at:  .github/workflows/worldcup-sync.yml
#
#  WHAT IT DOES
#  Every morning at 08:45 Athens time (05:45 UTC) it downloads the
#  latest worldcup2026.html from your OneDrive share link, strips any
#  stray text before <!DOCTYPE html>, and (if it changed) commits it
#  as index.html — your GitHub Pages site updates automatically.
#  You can also run it manually from the Actions tab.
#
#  IMPORTANT — which file to share:
#  The daily task now writes to the file at
#    Documents/Cowork/sessions/be408fc9-.../workspace/output/worldcup2026.html
#  (the most-recently-modified worldcup2026.html in your OneDrive).
#  Create the "Anyone with the link" share from THAT file and paste it
#  into ONEDRIVE_URL below — keep the &download=1 suffix.
#  No tokens are needed; GitHub Actions' built-in permission commits.
# ════════════════════════════════════════════════════════════════
name: Sync World Cup app from OneDrive

on:
  schedule:
    - cron: "45 5 * * *"   # 05:45 UTC = 08:45 Athens (EEST)
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write

env:
  # ⬇⬇⬇ PASTE THE SHARE LINK OF THE workspace/output FILE HERE (keep &download=1) ⬇⬇⬇
  ONEDRIVE_URL: "https://cspcosmos-my.sharepoint.com/:u:/g/personal/andreadakisj_cspcosmos_onmicrosoft_com/IQCCaqvagksMTYAcLA8u3pQXAYv0NwRZVfPvITQZIUJ2ftY?e=R4yz3x&download=1"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest file from OneDrive
        run: |
          curl -fsSL --retry 3 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -c /tmp/cj -b /tmp/cj "$ONEDRIVE_URL" -o index.html.new
          # Strip anything before <!DOCTYPE html> (guards against stray text at the top)
          sed -i '/<!DOCTYPE html>/,$!d' index.html.new
          # Safety check: make sure we actually got the app, not an error/login page
          grep -q "TOURNAMENT_DATA" index.html.new
          mv index.html.new index.html

      - name: Commit & publish if changed
        run: |
          git config user.name  "wc26-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes today — site already up to date."
          else
            git commit -m "Daily sync: World Cup 2026 data update ($(date -u +%F))"
            git push
          fi
